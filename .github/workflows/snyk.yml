name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Snyk SCA (dependency scan)
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --all-projects --sarif-file-output=snyk-sca.sarif

      - name: Upload SCA results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@e8e594e8799b6bc05d33c13d3d14e484b7b9cbc0 # v3.29.4
        with:
          sarif_file: snyk-sca.sarif

      - name: Run Snyk Code (SAST)
        uses: snyk/actions/node@8e119fbb6c251787721d34ba683ed48eba792766 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --sarif-file-output=snyk-sast.sarif

      - name: Upload SAST results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@e8e594e8799b6bc05d33c13d3d14e484b7b9cbc0 # v3.29.4
        with:
          sarif_file: snyk-sast.sarif
