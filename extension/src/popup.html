<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px system-ui, sans-serif; width: 300px; margin: 0; padding: 12px; }
      h1 { font-size: 13px; margin: 0 0 8px; }
      .origin { font-weight: 600; margin: 4px 0 12px; word-break: break-all; }
      .row { display: flex; gap: 6px; margin-bottom: 12px; }
      button { font: inherit; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
      button.sel { background: #e6f1fb; border-color: #85b7eb; }
      label { color: #777; display: block; margin-bottom: 4px; }
      select { font: inherit; width: 100%; padding: 6px; }
      .grant { width: 100%; padding: 8px; margin-top: 10px; background: #e6f1fb; border-color: #85b7eb; font-weight: 600; }
      ul { list-style: none; margin: 12px 0 0; padding: 12px 0 0; border-top: 1px solid #eee; }
      li { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 12px; }
      li .site { flex: 1; word-break: break-all; }
      .muted { color: #777; }
      .x { cursor: pointer; color: #999; }
    </style>
  </head>
  <body>
    <h1>browsight</h1>
    <div class="origin" id="origin">—</div>
    <label>Access</label>
    <div class="row" id="tier">
      <button data-tier="read" style="flex: 1">Read only</button>
      <button data-tier="full" class="sel" style="flex: 1">Full control</button>
    </div>
    <label>Allow for</label>
    <select id="timer"></select>
    <button class="grant" id="grant">Grant access</button>
    <div class="muted" style="margin-top: 14px">Allowed sites</div>
    <ul id="list"></ul>
    <script src="popup.js"></script>
  </body>
</html>
